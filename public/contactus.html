<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Safestay PG</title>
  <style>
    /* Reset and fonts */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #e3f2fd, #ffffff);
      color: #333;
      line-height: 1.6;
    }

    .contact-container {
      max-width: 1000px;
      margin: 50px auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      color: #0d47a1;
    }

    .header p {
      font-size: 1.1rem;
      color: #555;
    }

    .contact-info, .contact-form {
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
      margin-bottom: 20px;
      transition: transform 0.3s ease;
    }

    .contact-info:hover, .contact-form:hover {
      transform: translateY(-5px);
    }

    .contact-info h2, .contact-form h2 {
      color: #1565c0;
      margin-bottom: 15px;
      font-size: 1.5rem;
    }

    .info-item {
      margin: 10px 0;
    }

    .info-item strong {
      color: #0d47a1;
    }

    .contact-form form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .contact-form input, .contact-form textarea {
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .contact-form input:focus, .contact-form textarea:focus {
      border-color: #0d47a1;
    }

    .contact-form button {
      background: #0d47a1;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .contact-form button:hover {
      background: #1565c0;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .details {
        grid-template-columns: 1fr;
      }
    }

    /* Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .contact-info, .contact-form {
      animation: fadeInUp 0.8s ease forwards;
    }
  </style>
</head>
<body>
  <div class="contact-container">
    <div class="header">
      <h1>Contact Us</h1>
      <p>We’d love to hear from you! Get in touch with Safestay PG</p>
    </div>

    <div class="contact-info">
      <h2>Our Contact Details</h2>
      <div class="info-item"><strong>Address:</strong> 123 Main Road, Chennai, Tamil Nadu</div>
      <div class="info-item"><strong>Phone:</strong> +91 98765 43210</div>
      <div class="info-item"><strong>Email:</strong> safestaypg@gmail.com</div>
      <div class="info-item"><strong>Working Hours:</strong> Mon - Sat (9:00 AM - 8:00 PM)</div>
    </div>



  <script>
    // Form submission handler
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thank you for reaching out! We will get back to you soon.');
      this.reset();
    });
  </script>
</body>
</html>
