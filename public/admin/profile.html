<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Profile - PGMS</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    height: 100%;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .card {
    width: 98%;
    max-width: 1400px;
    height: 95%;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.25);
    padding: 15px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }

  .caption {
    font-weight: 700;
    font-size: 1.4rem;
    margin-bottom: 12px;
    color: #0713b7;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    border-left: 4px solid #6a11cb;
    padding-left: 8px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }

  label {
    font-weight: 600;
    color: #1a2a6c;
  }

  input {
    width: 100%;
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 1rem;
    transition: 0.3s;
  }
  input:focus {
    border-color: #2575fc;
    box-shadow: 0 0 5px rgba(37,117,252,0.3);
    outline: none;
  }

  .btn {
    align-self: flex-end;
    margin-top: 8px;
    padding: 12px 25px;
    border: none;
    border-radius: 50px;
    font-weight: 600;
    font-size: 1rem;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(45deg, #2575fc, #6a11cb);
    transition: all 0.3s ease;
  }
  .btn:hover {
    transform: scale(1.05);
    background: linear-gradient(45deg, #1a5ce6, #550ebf);
  }

  .note {
    font-size: 0.9rem;
    color: #6b7280;
    margin-top: 3px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="caption">Admin Profile</div>

  <form id="profileForm">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" value="Admin Name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="admin@example.com" required>

    <label for="phone">Phone</label>
    <input type="text" id="phone" name="phone" value="1234567890">

    <button type="submit" class="btn">Update Profile</button>
  </form>

  <div class="caption">Change Password</div>

  <form id="passwordForm">
    <label for="currentPassword">Current Password</label>
    <input type="password" id="currentPassword" name="currentPassword" required>

    <label for="newPassword">New Password</label>
    <input type="password" id="newPassword" name="newPassword" required>

    <label for="confirmPassword">Confirm New Password</label>
    <input type="password" id="confirmPassword" name="confirmPassword" required>
    <div class="note">Passwords must match.</div>

    <button type="submit" class="btn">Change Password</button>
  </form>
</div>

<script>
document.getElementById('profileForm').addEventListener('submit', function(e){
  e.preventDefault();
  alert('Profile updated successfully!');
});
document.getElementById('passwordForm').addEventListener('submit', function(e){
  e.preventDefault();
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  if(newPassword !== confirmPassword){
    alert('Passwords do not match!');
    return;
  }
  alert('Password changed successfully!');
});
</script>

</body>
</html>
