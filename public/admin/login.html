<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - PGMS</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
  :root {
    --bg: #ffffff;
    --card: #fff;
    --text: #0f172a;
    --muted: #6b7280;
    --accent-start: #1e3a8a;
    --accent-end: #2563eb;
  }
  .dark {
    --bg: #0b1220;
    --card: #0f1724;
    --text: #e6eef8;
    --muted: #9aa6bb;
    --accent-start: #0f1724;
    --accent-end: #0b1220;
  }

  body {
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    transition: background 0.3s;
    position: relative;
  }

  /* Navbar */
  .navbar {
    width: 100%;
    display:flex;
    justify-content: space-between;
    align-items:center;
    padding:12px 24px;
    position: fixed;
    top:0;
    left:0;
    background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
    color: white;
    font-weight:600;
    z-index:10;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
  }
  .brand {
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand i { font-size:20px; color:#fff; }
  .theme-btn {
    background: rgba(255,255,255,0.15);
    border:none;
    padding:8px;
    border-radius:8px;
    cursor:pointer;
    color:white;
    font-size:16px;
  }

  /* Centering card */
  .login-container {
    flex: 1;
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:80px;
    padding-bottom:20px;
    background: var(--bg);
  }

  .login-card {
    background: var(--card);
    border-radius:14px;
    width:100%;
    max-width: 400px;
    padding:30px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    position:relative;
    animation: fadeIn 0.5s ease forwards;
  }
  @keyframes fadeIn { from{opacity:0; transform:scale(0.95);} to{opacity:1; transform:scale(1);} }

  /* Logo */
  .logo-spot {
    width:70px; height:70px;
    background: linear-gradient(135deg,#1e3a8a,#2563eb);
    border-radius:18px;
    display:grid;
    place-items:center;
    margin:0 auto 16px auto;
    color:white;
    font-size:32px;
  }

  h2 { text-align:center; margin:8px 0 18px; color:var(--accent-start); }
  p.sub { text-align:center; font-size:13px; color:var(--muted); margin-bottom:20px; }

  /* Floating labels */
  .field { position:relative; margin-bottom:16px; }
  .field input {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #cbd5e1;
    background: transparent;
    color: var(--text);
    font-size:14px;
    transition: all 0.2s;
  }
  .field input:focus { border-color:#2563eb; box-shadow:0 0 6px rgba(37,99,235,0.4); outline:none; }
  .field label {
    position:absolute;
    left:12px; top:12px;
    color: var(--muted);
    font-size:14px;
    pointer-events:none;
    transition:0.2s ease all;
    background: var(--card);
    padding:0 4px;
  }
  .field input:focus + label,
  .field input:not(:placeholder-shown) + label {
    top:-8px;
    left:10px;
    font-size:12px;
    color:#2563eb;
  }

  /* Password toggle */
  .icon-right { position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; color:var(--muted); }

  /* Login button */
  .primary-btn {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    font-weight:600;
    background: linear-gradient(90deg,#1e3a8a,#2563eb);
    color:white;
    cursor:pointer;
    transition: all 0.2s;
  }
  .primary-btn:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(37,99,235,0.2); }

  .links { display:flex; justify-content:space-between; font-size:13px; margin-top:8px; }
  .links a { color:var(--muted); text-decoration:none; }
  .links a:hover { text-decoration:underline; color:var(--text); }

  /* Shake animation */
  .shake { animation: shakeAnim 0.3s; }
  @keyframes shakeAnim { 0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);} }

  /* Success check */
  .success-check {
    position:absolute;
    top:-24px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    color:#22c55e;
    opacity:0;
    animation: checkFade 0.6s forwards;
  }
  @keyframes checkFade { 0%{opacity:0;transform:translate(-50%,10px);}50%{opacity:1;transform:translate(-50%,-4px);}100%{opacity:1;transform:translate(-50%,0);} }

  /* Message */
  .message { text-align:center; margin-top:12px; font-size:14px; }
</style>
</head>
<body>

<header class="navbar">
  <div class="brand"><i class="fa-solid fa-house"></i> PGMS Admin</div>
  <button class="theme-btn" id="themeBtn" title="Toggle dark mode"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
</header>

<div class="login-container">
  <div class="login-card" id="loginCard">
    <div class="logo-spot"><i class="fa-solid fa-house"></i></div>
    <h2>Admin Login</h2>
    <p class="sub">Sign in to manage PG listings and reviews</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <input type="email" id="email" placeholder=" " required>
        <label for="email">Email</label>
      </div>
      <div class="field">
        <input type="password" id="password" placeholder=" " required>
        <label for="password">Password</label>
        <div class="icon-right"><i id="pwdToggle" class="fa-solid fa-eye"></i></div>
      </div>
      <button type="submit" class="primary-btn" id="loginBtn">Login</button>
      <div id="message" class="message"></div>
      <div class="links">
        <a href="/">Back to Home</a>
      </div>
    </form>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
const bodyEl = document.documentElement;
const themeBtn = document.getElementById('themeBtn');
const themeIcon = document.getElementById('themeIcon');
const pwdToggle = document.getElementById('pwdToggle');
const passwordField = document.getElementById('password');
const loginForm = document.getElementById('loginForm');
const loginCard = document.getElementById('loginCard');
const messageEl = document.getElementById('message');

// Dark mode toggle
const savedTheme = localStorage.getItem('pgms_theme');
const applyTheme = (theme) => {
  if(theme==='dark'){ bodyEl.classList.add('dark'); themeIcon.className='fa-solid fa-sun'; }
  else { bodyEl.classList.remove('dark'); themeIcon.className='fa-solid fa-moon'; }
}
applyTheme(savedTheme || 'light');
themeBtn.addEventListener('click', ()=>{
  const isDark = bodyEl.classList.contains('dark');
  const newTheme = isDark?'light':'dark';
  applyTheme(newTheme);
  localStorage.setItem('pgms_theme',newTheme);
});

// Password toggle
pwdToggle.addEventListener('click',()=>{
  const show = passwordField.type==='password';
  passwordField.type = show?'text':'password';
  pwdToggle.className = show?'fa-solid fa-eye-slash icon-right':'fa-solid fa-eye icon-right';
});

// Login submit
loginForm.addEventListener('submit', async(e)=>{
  e.preventDefault();
  messageEl.textContent='';
  loginCard.classList.remove('shake');
  const email = document.getElementById('email').value.trim();
  const password = passwordField.value;

  if(!email || !password){ messageEl.textContent='Please fill both fields.'; loginCard.classList.add('shake'); return; }

  const btn = document.getElementById('loginBtn');
  const originalText = btn.textContent;
  btn.disabled=true;
  btn.textContent='Signing in...';

  try{
    const res = await fetch('/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data = await res.json();

    if(data.success){
      messageEl.style.color='#22c55e';
      messageEl.textContent=data.message || 'Logged in!';
      const check = document.createElement('div'); check.className='success-check'; check.innerHTML='<i class="fa-solid fa-circle-check"></i>';
      loginCard.appendChild(check);
      setTimeout(()=>window.location.href='/admin/dashboard.html',800);
    } else {
      messageEl.style.color='#ef4444';
      messageEl.textContent=data.message||'Invalid credentials.';
      loginCard.classList.add('shake');
    }
  } catch(err){
    console.error(err);
    messageEl.style.color='#ef4444';
    messageEl.textContent='Server error, please try later.';
    loginCard.classList.add('shake');
  } finally{ btn.disabled=false; btn.textContent=originalText; }
});
</script>
</body>
</html>
