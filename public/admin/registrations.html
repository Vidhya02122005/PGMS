<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registered Users</title>
<style>
  /* ===== Body and Font ===== */
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 20px;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: #333;
  }

  /* ===== Card Style ===== */
  .card {
    background: #fff;
    padding: 25px 30px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    max-width: 100%;
    margin: 0 auto 25px auto;
  }

  /* ===== Heading ===== */
  h2 {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 700;
    margin-bottom: 20px;
    background: linear-gradient(135deg, #2575fc, #6a11cb);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ===== Table ===== */
  table {
    width: 100%;
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  }

  th, td {
    padding: 12px 10px;
    text-align: left;
    border-bottom: 1px solid #eee;
    font-size: 0.95rem;
  }

  th {
    background: #2575fc;
    color: white;
    font-weight: 600;
  }

  tr:nth-child(even) {
    background: #f9f9f9;
  }

  /* ===== Buttons ===== */
  button {
    padding: 6px 12px;
    font-size: 0.9rem;
    font-weight: 600;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #2575fc;
    color: #fff;
    transition: 0.3s;
  }

  button:hover {
    background: #6a11cb;
  }

  a { text-decoration: none; }

  /* ===== Responsive ===== */
  @media(max-width: 900px) {
    table, th, td { font-size: 12px; }
    th, td { padding: 8px; }
  }
</style>
</head>
<body>

<div class="card">
  <h2>All Registered Users</h2>
  <table id="usersTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Mother Name</th>
        <th>Mother Phone</th>
        <th>Father Name</th>
        <th>Father Phone</th>
        <th>Guardian Name</th>
        <th>Guardian Phone</th>
        <th>Address</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
async function fetchUsers() {
  try {
    const res = await fetch('/admin/registrations');
    if (res.status === 401) {
      alert('You must be logged in as admin!');
      window.location.href = 'admin-login.html';
      return;
    }

    const data = await res.json();
    const tbody = document.querySelector('#usersTable tbody');
    tbody.innerHTML = '';

    if(data.success) {
      data.users.forEach(user => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${user.name}</td>
          <td>${user.email}</td>
          <td>${user.phone || '-'}</td>
          <td>${user.motherName || '-'}</td>
          <td>${user.motherPhone || '-'}</td>
          <td>${user.fatherName || '-'}</td>
          <td>${user.fatherPhone || '-'}</td>
          <td>${user.guardianName || '-'}</td>
          <td>${user.guardianPhone || '-'}</td>
          <td>${user.address || '-'}</td>
          <td>
            <a href="viewdetails.html?userId=${user._id}">
              <button>View Details</button>
            </a>
          </td>
        `;
        tbody.appendChild(row);
      });
    }
  } catch(err) {
    console.error(err);
    alert('Error fetching users');
  }
}

// Fetch users on page load
fetchUsers();
</script>

</body>
</html>
