<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Notifications - PGMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom right, #e3f2fd, #f8f9fa);
    min-height: 100vh;
    display: flex;
    margin: 0;
    animation: fadeIn 0.8s ease-in;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Sidebar */
  .sidebar {
    width: 260px;
    background: linear-gradient(180deg,#1a49b0,#6a11cb);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    overflow-y: auto;
  }

  .sidebar h2 { text-align: center; font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 1px; }
  .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
  .nav-links li { margin-bottom: 20px; }
  .nav-links li a {
    text-decoration: none;
    color: #cbd5e1;
    display: block;
    padding: 12px 15px;
    border-radius: 10px;
    transition: 0.3s;
    font-weight: 500;
  }
  .nav-links li a:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-links li a.active { background: #fff; color: #2575fc; font-weight: 600; }
  .logout-btn {
    margin-top: auto;
    padding: 12px 15px;
    border: none;
    border-radius: 10px;
    background: #fff;
    color: #2575fc;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }
  .logout-btn:hover { background: #f1f1f1; }

  /* Content */
  .content { flex-grow: 1; margin-left: 260px; padding: 40px 20px; min-height: 100vh; }

  h1.page-title {
    font-weight: 700;
    font-size: 1.8rem;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #6a11cb, #2575fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeIn 1s ease-in;
  }

  .notif-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    padding: 30px;
    max-width: 1200px;
    margin: auto;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .notif-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
  }
  th, td { padding: 12px; text-align: center; }
  thead { background: #2575fc; color: #fff; }
  tbody tr:nth-child(even) { background-color: #e7f1ff; }
  tbody tr:hover { background-color: #cfe2ff; }

  footer { text-align: center; margin-top: 25px; font-size: 14px; color: #6c757d; }
  footer span { color: #2575fc; font-weight: 600; }

  @media (max-width: 768px) {
    .sidebar { position: relative; width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 15px; }
    .content { margin-left: 0; padding: 20px; }
    .nav-links { display: flex; flex-direction: row; gap: 10px; }
    h1.page-title { font-size: 1.4rem; }
  }
</style>
</head>

<body>
<div class="sidebar">
  <h2>User Panel</h2>
  <ul class="nav-links" id="nav-links"></ul>
  <button class="logout-btn" id="logout-btn">Logout</button>
</div>

<div class="content">
 

  <div class="notif-card">
     <h1 class="page-title">Notifications</h1>
    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle" id="notificationsTable">
        <thead>
          <tr>
            <th>Title</th>
            <th>Message</th>
            <th>Type</th>
            <th>Sent At</th>
          </tr>
        </thead>
        <tbody id="notifTable">
          <tr><td colspan="4">Loading notifications...</td></tr>
        </tbody>
      </table>
    </div>
    <footer>Powered by <span>PGMS</span> | Notification System</footer>
  </div>
</div>

<script>
  const navLinks = [
    { name: 'Attendance', href: 'attendance.html' },
    { name: 'Complaints', href: 'complaints.html' },
    { name: 'Notifications', href: 'notifications.html' },
    { name: 'Payments', href: 'payments.html' },
    { name: 'Rooms', href: 'rooms.html' },
    { name: 'Meal Plan', href: 'mealplan.html' }
  ];

  async function loadUserInfo() {
    try {
      const res = await fetch('/users/me');
      if(!res.ok) throw new Error('Not logged in');
      const userData = await res.json();
      const nav = document.getElementById('nav-links');
      navLinks.forEach(link => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = link.href;
        a.textContent = link.name;
        if(window.location.pathname.includes(link.href)) a.classList.add('active');
        li.appendChild(a);
        nav.appendChild(li);
      });
      return userData._id || userData.id;
    } catch(err) {
      console.error(err);
      return null;
    }
  }

  async function loadNotifications() {
    const userId = await loadUserInfo();
    const tbody = document.getElementById('notifTable');
    if(!userId) {
      tbody.innerHTML = '<tr><td colspan="4">Please login to see notifications.</td></tr>';
      return;
    }

    try {
      const res = await fetch('/user/notifications');
      if(!res.ok) throw new Error('Cannot fetch notifications');
      const data = await res.json();
      tbody.innerHTML = '';
      if(!data.success || data.notifications.length===0){
        tbody.innerHTML = '<tr><td colspan="4">No notifications yet.</td></tr>';
        return;
      }
      data.notifications.forEach(notif=>{
        if(notif.isGeneral){
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${notif.title}</td>
            <td>${notif.message}</td>
            <td>${notif.type || 'General'}</td>
            <td>${new Date(notif.createdAt).toLocaleString()}</td>
          `;
          tbody.appendChild(tr);
        }
      });
    } catch(err){
      tbody.innerHTML = '<tr><td colspan="4">Error loading notifications.</td></tr>';
    }
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    try {
      const res = await fetch('/user/logout', { method: 'POST' });
      const data = await res.json();
      if (data.success) window.location.href = 'login.html';
      else alert('Logout failed');
    } catch (err) { console.error(err); }
  });

  loadNotifications();
</script>
</body>
</html>
