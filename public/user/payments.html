<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Payments - PGMS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(to bottom right, #e3f2fd, #f8f9fa);
    min-height: 100vh;
    display: flex;
    margin: 0;
    animation: fadeIn 0.8s ease-in;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
   #slip button {
    background: #2575fc;  /* Blue color */
    color: white;          /* White text */
    border: none;
    padding: 10px 20px;    /* Slightly larger for consistency */
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

#slip button:hover {
    background: #1a49b0;   /* Darker blue on hover */
    transform: scale(1.05);
}



  /* Sidebar */
  .sidebar {
    width: 260px;
    background: linear-gradient(180deg,#1a49b0,#6a11cb);
    color: #fff;
    display: flex;
    flex-direction: column;
    padding: 30px 20px;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    overflow-y: auto;
  }

  .sidebar h2 { text-align: center; font-size: 1.8rem; margin-bottom: 30px; letter-spacing: 1px; }
  .nav-links { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
  .nav-links li { margin-bottom: 20px; }
  .nav-links li a {
    text-decoration: none;
    color: #cbd5e1;
    display: block;
    padding: 12px 15px;
    border-radius: 10px;
    transition: 0.3s;
    font-weight: 500;
  }
  .nav-links li a:hover { background: rgba(255,255,255,0.15); color: #fff; }
  .nav-links li a.active { background: #fff; color: #2575fc; font-weight: 600; }
  .logout-btn {
    margin-top: auto;
    padding: 12px 15px;
    border: none;
    border-radius: 10px;
    background: #fff;
    color: #2575fc;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
  }
  .logout-btn:hover { background: #f1f1f1; }

  /* Content */
  .content { flex-grow: 1; margin-left: 260px; padding: 40px 20px; min-height: 100vh; }

  h1.page-title {
    font-weight: 700;
    font-size: 1.8rem;
    margin-bottom: 20px;
    background: linear-gradient(90deg, #6a11cb, #2575fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeIn 1s ease-in;
  }

  .payment-card {
    background: #ffffff;
    border-radius: 20px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    padding: 30px;
    max-width: 1200px;
    margin: auto;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .payment-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.15);
  }

  .payment-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
    align-items: center;
    margin-bottom: 30px;
  }

  .payment-box img {
    width: 220px;
    border-radius: 12px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  }

  .payment-box input {
    width: 100%;
    max-width: 250px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #0d6efd;
    transition: all 0.3s ease;
  }
  .payment-box input:focus {
    outline: none;
    border-color: #6a11cb;
    box-shadow: 0 0 8px rgba(106,17,203,0.2);
  }

  .payment-box button {
    background: #2575fc;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
  }
  .payment-box button:hover { background: #1a49b0; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
  }
  th, td {
    padding: 12px;
    text-align: center;
  }
  thead { background: #2575fc; color: #fff; }
  tbody tr:nth-child(even) { background-color: #e7f1ff; }
  tbody tr:hover { background-color: #cfe2ff; }

  #slip {
    display: none;
    background: white;
    border-radius: 12px;
    padding: 20px;
    width: 400px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    margin: 20px auto 0;
    animation: popUp 0.5s ease forwards;
  }
  #slip h3 { text-align: center; color: #2575fc; margin-bottom: 15px; }

  @keyframes popUp {
    from { opacity: 0; transform: scale(0.8);}
    to { opacity: 1; transform: scale(1);}
  }

  footer { text-align: center; margin-top: 25px; font-size: 14px; color: #6c757d; }
  footer span { color: #2575fc; font-weight: 600; }

  @media (max-width: 768px) {
    .sidebar { position: relative; width: 100%; height: auto; flex-direction: row; overflow-x: auto; padding: 15px; }
    .content { margin-left: 0; padding: 20px; }
    .nav-links { display: flex; flex-direction: row; gap: 10px; }
    h1.page-title { font-size: 1.4rem; }

    
  }
</style>
</head>

<body>
<div class="sidebar">
  <h2>User Panel</h2>
  <ul class="nav-links" id="nav-links"></ul>
  <button class="logout-btn" id="logout-btn">Logout</button>
</div>

<div class="content">
  <div class="payment-card">
    <h1 class="page-title">My Payments</h1>
    <div class="payment-box">
      <img src="QrCode.jpeg" alt="Scan QR Code">
      <input type="number" id="amount" placeholder="Enter Amount">
      <input type="text" id="txnId" placeholder="Enter Transaction ID">
      <button onclick="makePayment()">Submit Payment</button>
    </div>

    <div class="table-responsive">
      <table id="paymentsTable" class="table table-bordered table-striped align-middle">
        <thead>
          <tr>
            <th>Amount</th>
            <th>Method</th>
            <th>Transaction ID</th>
            <th>Status</th>
            <th>Date</th>
            <th>Slip</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div id="slip">
      <h3>Payment Slip</h3>
      <p id="slipDetails"></p>
      <button onclick="printSlip()">Print</button>
    </div>

    <footer>Powered by <span>PGMS</span> | Payment Management System</footer>
  </div>
</div>

<script>
  const navLinks = [
    { name: 'Attendance', href: 'attendance.html' },
    { name: 'Complaints', href: 'complaints.html' },
    { name: 'Notifications', href: 'notifications.html' },
    { name: 'Payments', href: 'payments.html' },
    { name: 'Rooms', href: 'rooms.html' },
    { name: 'Meal Plan', href: 'mealplan.html' }
  ];

  let currentUser = null;

  async function loadUserInfo() {
    try {
      const res = await fetch('/users/me');
      if(!res.ok) throw new Error('Not logged in');
      currentUser = await res.json();

      const nav = document.getElementById('nav-links');
      navLinks.forEach(link => {
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = link.href;
        a.textContent = link.name;
        if(window.location.pathname.includes(link.href)) a.classList.add('active');
        li.appendChild(a);
        nav.appendChild(li);
      });
    } catch(err) {
      alert('Please login to view payments');
    }
  }

  async function makePayment() {
    const amount = document.getElementById('amount').value;
    const txnId = document.getElementById('txnId').value;
    if(!amount || amount <=0 || !txnId) return alert('Enter valid amount and txnId');
  
    const res = await fetch('/user/payments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser._id, amount, txnId })
    });
    const data = await res.json();
    if(data.success){
        document.getElementById('amount').value = '';
        document.getElementById('txnId').value = '';
        fetchPayments();
    } else {
        alert(data.message || 'Error submitting payment');
    }
  }

  async function fetchPayments(){
    const res = await fetch(`/user/payments/${currentUser._id}`);
    const data = await res.json();
    const tbody = document.querySelector('#paymentsTable tbody');
    tbody.innerHTML = '';
    if(data.success){
        data.payments.forEach((p,i)=>{
            const tr = document.createElement('tr');
            tr.style.animation = `fadeIn 0.5s ease forwards`;
            tr.style.animationDelay = `${i*0.1}s`;
            tr.innerHTML = `
                <td>${p.amount}</td>
                <td>QR</td>
                <td>${p.txnId}</td>
                <td>${p.status}</td>
                <td>${new Date(p.date).toLocaleString()}</td>
                <td>${p.status === 'Completed'? `<button class='print-slip' onclick='showSlip(${JSON.stringify(p)})'>Print Slip</button>` : '-'}</td>
            `;
            tbody.appendChild(tr);
        });
    }
  }

  function showSlip(p){
    const slip = document.getElementById('slip');
    slip.style.display='block';
    slip.style.animation='popUp 0.5s ease forwards';
    document.getElementById('slipDetails').innerHTML = `
        <table style="width:100%; border-collapse: collapse;">
            <tr><td><strong>User:</strong></td><td>${currentUser.name}</td></tr>
            <tr><td><strong>Amount:</strong></td><td>${p.amount}</td></tr>
            <tr><td><strong>Method:</strong></td><td>QR</td></tr>
            <tr><td><strong>Txn ID:</strong></td><td>${p.txnId}</td></tr>
            <tr><td><strong>Status:</strong></td><td>${p.status}</td></tr>
            <tr><td><strong>Date:</strong></td><td>${new Date(p.date).toLocaleString()}</td></tr>
        </table>
    `;
  }

  function printSlip(){
    const slipContent = document.getElementById('slip').innerHTML;
    const style = `
        <style>
            body { font-family: Arial; padding: 20px; }
            h3 { text-align:center; color:#2575fc; }
            table td { padding:6px 10px; }
        </style>
    `;
    const w = window.open('', '', 'width=500,height=600');
    w.document.write(`<html><head>${style}</head><body>${slipContent}</body></html>`);
    w.document.close();
    w.print();
  }

  document.getElementById('logout-btn').addEventListener('click', async () => {
    try {
      const res = await fetch('/user/logout', { method: 'POST' });
      const data = await res.json();
      if (data.success) window.location.href = 'login.html';
      else alert('Logout failed');
    } catch (err) { console.error(err); }
  });

  loadUserInfo().then(fetchPayments);
</script>

</body>
</html>
