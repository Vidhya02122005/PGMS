<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Registration</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-vd3c6+..." crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  body { background: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
  .register-container { background: #fff; padding: 40px 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 100%; max-width: 500px; }
  .register-container h2 { color: #4f46e5; margin-bottom: 20px; font-size: 32px; text-align: center; }
  .form-section { margin-bottom: 25px; }
  .form-section h4 { margin-bottom: 10px; color: #374151; font-size: 16px; text-align: left; border-bottom: 1px solid #e5e7eb; padding-bottom: 5px; }
  input, textarea { width: 100%; padding: 12px 15px; margin: 8px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; transition: all 0.3s ease; resize: none; }
  input:focus, textarea:focus { border-color: #4f46e5; outline: none; box-shadow: 0 0 8px rgba(79,70,229,0.3); }
  .password-wrapper { position: relative; }
  .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #555; }
  button { width: 100%; padding: 14px; margin-top: 10px; background: #4f46e5; color: #fff; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: all 0.3s ease; }
  button:hover { background: #6c5ce7; }
  p { margin-top: 20px; font-size: 14px; color: #6b7280; text-align: center; }
  a { color: #4f46e5; font-weight: 500; text-decoration: none; }
  a:hover { text-decoration: underline; }
  @media(max-width: 550px){ .register-container { padding: 30px 20px; } .register-container h2 { font-size: 28px; } }
  small { color: red; display: block; margin-top: 5px; font-size: 13px; }
  
  /* Centering utility for Google button container */
  .google-signup-wrapper {
    display: flex;
    justify-content: center;
    margin-top: 20px;
    width: 100%;
  }
</style>

<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

<div class="register-container">
  <h2>User Registration</h2>
  <form id="registerForm">

    <div class="form-section">
      <input type="text" id="name" placeholder="Name" required>
      <input type="date" id="dob" placeholder="Date of Birth" required>
      <input type="text" id="phone" placeholder="Phone Number" required>
      <input type="email" id="email" placeholder="Email" required>

      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Password" required>
        <span class="toggle-password" onclick="togglePassword()">
          <i class="fa-regular fa-eye" id="eyeIcon"></i>
        </span>
      </div>
      <small id="passwordHelp">Password must be at least 8 chars, include uppercase, lowercase, number & special character.</small>

      <textarea id="address" placeholder="Address" rows="3" required></textarea>
    </div>

    <div class="form-section">
      <h4>Mother's Details</h4>
      <input type="text" id="motherName" placeholder="Mother Name" required>
      <input type="text" id="motherPhone" placeholder="Mother Phone" required>
    </div>

    <div class="form-section">
      <h4>Father's Details</h4>
      <input type="text" id="fatherName" placeholder="Father Name" required>
      <input type="text" id="fatherPhone" placeholder="Father Phone" required>
    </div>

    <div class="form-section">
      <h4>Guardian's Details</h4>
      <input type="text" id="guardianName" placeholder="Guardian Name" required>
      <input type="text" id="guardianPhone" placeholder="Guardian Phone" required>
    </div>

    <button type="submit">Register</button>
  </form>

  <p>
    <a href="forgot-password.html">Forgot Password?</a> | 
    <a href="change-password.html">Change Password</a>
  </p>

  <div id="g_id_onload"
       data-client_id="558603790761-ldiis94nf6j3fumvug0fiu2ai0cmrdkt.apps.googleusercontent.com"
       data-context="signup"
       data-ux_mode="popup"
       data-callback="handleCredentialResponse"
       data-auto_prompt="false">
  </div>
  <div class="google-signup-wrapper">
    <div class="g_id_signin" 
         data-type="standard" 
         data-shape="skewed" 
         data-theme="outline" 
         data-text="signup_with" 
         data-size="large" 
         data-logo_alignment="left">
    </div>
  </div>
</div>

<script>
  // Toggle password visibility
  function togglePassword() {
    const password = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");
    if(password.type === "password") {
      password.type = "text";
      eyeIcon.classList.remove("fa-eye");
      eyeIcon.classList.add("fa-eye-slash");
    } else {
      password.type = "password";
      eyeIcon.classList.remove("fa-eye-slash");
      eyeIcon.classList.add("fa-eye");
    }
  }

  // Password strength regex
  function isStrongPassword(pw) {
    return /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+{}\[\]:;<>,.?~\\/-]).{8,}$/.test(pw);
  }

  // Form submission
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pw = document.getElementById('password').value;
    if(!isStrongPassword(pw)){
      alert("Password does not meet strength requirements!");
      return;
    }

    const data = {
      name: document.getElementById('name').value,
      dob: document.getElementById('dob').value,
      phone: document.getElementById('phone').value,
      email: document.getElementById('email').value,
      password: pw,
      address: document.getElementById('address').value,
      motherName: document.getElementById('motherName').value,
      motherPhone: document.getElementById('motherPhone').value,
      fatherName: document.getElementById('fatherName').value,
      fatherPhone: document.getElementById('fatherPhone').value,
      guardianName: document.getElementById('guardianName').value,
      guardianPhone: document.getElementById('guardianPhone').value
    };

    try {
      const res = await fetch('/user/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();
      alert(result.message);
      if(result.success) window.location.href = 'login.html';
    } catch (err) {
      console.error(err);
      alert('Server error. Try again later.');
    }
  });

  // Google Sign-In handler
  function handleCredentialResponse(response) {
    const id_token = response.credential;
    fetch('/user/google-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token: id_token })
    })
    .then(res => res.json())
    .then(data => {
      if(data.success) {
        alert("Welcome " + data.user.name);
        window.location.href = "dashboard.html";
      } else {
        alert("Google Sign-In failed!");
      }
    })
    .catch(err => console.error(err));
  }
</script>

</body>
</html>
