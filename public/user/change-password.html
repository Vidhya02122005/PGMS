<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password - PGMS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  body { font-family:'Inter', sans-serif; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f4f6f8; }
  form { background:#fff; padding:40px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); width:350px; text-align:center; }
  h2 { color:#1e3a8a; margin-bottom:30px; }
  input { width:100%; padding:12px; margin-bottom:20px; border:1px solid #cbd5e1; border-radius:8px; }
  button { width:100%; padding:12px; border:none; border-radius:8px; background:#1e3a8a; color:#fff; font-weight:600; cursor:pointer; }
  button:hover { background:#2563eb; }
  #message { text-align:center; color:red; margin-bottom:10px; }
  .switch { text-align:center; margin-top:15px; font-size:14px; color:#64748b; }
  .switch a { color:#1e3a8a; text-decoration:none; }
  .switch a:hover { text-decoration:underline; }
</style>
</head>
<body>

<form id="changeForm">
  <h2>Change Password</h2>
  <input type="password" id="currentPassword" placeholder="Current Password" required>
  <input type="password" id="newPassword" placeholder="New Password" required>
  <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
  <button type="submit">Change Password</button>
  <div id="message"></div>
  <div class="switch"><p><a href="login.html">Back to Login</a></p></div>
</form>

<script>
document.getElementById('changeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const currentPassword = document.getElementById('currentPassword').value;
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const messageDiv = document.getElementById('message');

  if(newPassword !== confirmPassword){
    messageDiv.textContent = "New Password and Confirm Password do not match!";
    return;
  }

  try {
    const res = await fetch('/user/change-password', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ currentPassword, newPassword })
    });
    const data = await res.json();
    messageDiv.textContent = data.message;
    if(data.success) setTimeout(()=>{ window.location.href='login.html'; }, 2000);
  } catch(err) {
    messageDiv.textContent = 'Server error. Try again later.';
    console.error(err);
  }
});
</script>

</body>
</html>
